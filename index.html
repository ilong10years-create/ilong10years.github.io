<!DOCTYPE html>
<html lang="zh-CN">
<head>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #f8e1f4 0%, #f9c9e2 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Poppins', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .quiz-card {
            max-width: 750px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: all 0.3s;
        }
        .quiz-panel, .result-panel {
            padding: 30px 25px 40px;
        }
        h1 {
            font-size: 1.8rem;
            text-align: center;
            color: #b33b6e;
            margin-bottom: 10px;
        }
        .sub {
            text-align: center;
            color: #a55a7a;
            margin-bottom: 30px;
            font-style: italic;
        }
        .question {
            margin-bottom: 30px;
            border-bottom: 1px dashed #ffb6c1;
            padding-bottom: 20px;
        }
        .question h3 {
            color: #c44c7c;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        .option {
            display: block;
            background: #fff0f5;
            margin: 10px 0;
            padding: 12px 16px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #ffccdd;
            font-weight: 500;
        }
        .option:hover {
            background: #ffe0ed;
            transform: translateX(5px);
        }
        input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: #d46b9e;
        }
        .submit-btn {
            display: block;
            width: 220px;
            margin: 30px auto 0;
            background: linear-gradient(95deg, #e86ca5, #b34572);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(180,70,120,0.4);
        }
        .result-card {
            text-align: center;
        }
        .result-name {
            font-size: 2.5rem;
            font-weight: bold;
            color: #b33b6e;
            margin: 10px 0;
        }
        .result-group {
            font-size: 1.2rem;
            color: #aa6f8c;
            margin-bottom: 20px;
        }
        .result-desc {
            background: #fff0f5;
            padding: 20px;
            border-radius: 30px;
            margin: 20px 0;
            font-size: 1rem;
            line-height: 1.5;
            color: #4a2e3a;
            text-align: left;
        }
        .easter-egg {
            background: #ffe8b6;
            color: #b45f1b;
            padding: 15px;
            border-radius: 40px;
            font-weight: bold;
            margin: 15px 0;
            font-size: 1.1rem;
            border-left: 8px solid #ffa500;
        }
        .warning {
            font-size: 0.8rem;
            color: #b38b9b;
            margin-top: 20px;
        }
        .retry-btn {
            display: inline-block;
            background: #c95a88;
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            text-decoration: none;
            margin-top: 20px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 15px;
            background: #ffeef4;
            color: #b2859b;
        }
        @media (max-width: 550px) {
            .quiz-panel, .result-panel { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .result-name { font-size: 1.8rem; }

        "Daesung": { group: "BIGBANG", desc: "开心果，笑点低到地板，连你摔跤他都能笑半小时。你骨折了他还笑，护士以为他是你仇人。优点是永远不会冷战，因为他一看到你就笑场。" },

        "Park Jihoon": { group: "TREASURE", desc: "可爱担当，但爱哭，连你忘记回消息都能哭一小时。你道歉他哭更凶，你哄他他边哭边笑，你怀疑他表演系毕业。" },

        "Kim Doyoung": { group: "TREASURE", desc: "撒娇怪，你鸡皮疙瘩掉一地，他还不肯停。你求他正常说话，他撒娇‘人家哪里不正常嘛～’，你晕倒。" },
        "Haruto": { group: "TREASURE", desc: "低音炮，说情话像在念咒语，你听完只想逃。他认真问‘你愿意和我一起沉沦吗？’你答‘我选择报警’。" },
        "Park Jeongwoo": { group: "TREASURE", desc: "吃货，你工资都用来买零食，他还嫌不够。你减肥他往你嘴里塞炸鸡，说‘胖点可爱’，你胖了他说‘该减肥了’。" },
        "So Junghwan": { group: "TREASURE", desc: "忙内，幼稚到抢你冰淇淋，还得意洋洋。你看动画片他抢遥控器，你看韩剧他吐槽男主丑。你怀疑你养了个儿子。" }

    // ---------- 新增问题至10个 ----------

        { text: "你周末最喜欢做什么？", options: [
            { text: "在家躺尸，刷剧吃零食", match: "Yoshi" },
            { text: "去健身房挥汗如雨", match: "Riku" },
            { text: "逛美术馆/看展", match: "T.O.P" },
            { text: "蹦迪到天亮", match: "G-Dragon" },
            { text: "和朋友一起打游戏", match: "Ryo" }
        ]},

            { text: "高级餐厅", match: "Suho" },
            { text: "海边散步", match: "Taeyang" },
            { text: "游乐园", match: "Mashiho" },
            { text: "家里打游戏", match: "Kai" },
            { text: "录音室", match: "Bang Yedam" }
        ]},
        { text: "你最受不了对方什么？", options: [
            { text: "控制欲太强", match: "Choi Hyunsuk" },
            { text: "太粘人", match: "Kim Doyoung" },
            { text: "工作狂", match: "Lay" },
            { text: "太幼稚", match: "So Junghwan" },
            { text: "爱哭", match: "Park Jihoon" }
        ]},
        { text: "你最喜欢的电影类型？", options: [
            { text: "恐怖片", match: "Asahi" },
            { text: "喜剧片", match: "Daesung" },
            { text: "爱情片", match: "Chen" },
            { text: "科幻片", match: "Haruto" },
            { text: "纪录片", match: "Jaehee" }
        ]},
        { text: "你的理想型外貌特征是？", options: [
            { text: "可爱童颜", match: "Xiumin" },
            { text: "高冷模特脸", match: "Sehun" },
            { text: "阳光运动型", match: "Chanyeol" },
            { text: "温柔暖男", match: "Sion" },
            { text: "异国风情", match: "Yushi" }
        ]},
        { text: "你更看重男生的什么能力？", options: [
            { text: "厨艺", match: "D.O." },
            { text: "赚钱能力", match: "Seungri" },
            { text: "音乐才华", match: "Baekhyun" },
            { text: "幽默感", match: "Daesung" },
            { text: "运动神经", match: "Riku" }
        ]},
        { text: "如果你养宠物，你会养？", options: [
            { text: "猫", match: "Sakuya" },
            { text: "狗", match: "Park Jeongwoo" },
            { text: "仓鼠", match: "Kim Junkyu" },
            { text: "蛇", match: "Asahi" },
            { text: "不养宠物", match: "Yoon Jaehyuk" }
        ]},
        // 新增第8题
        { text: "你最讨厌哪种行为？", options: [
            { text: "抠门", match: "Suho" },
            { text: "话多", match: "Baekhyun" },
            { text: "迟到", match: "Haruto" },
            { text: "炫富", match: "Seungri" },
            { text: "装可爱", match: "Park Jihoon" }
        ]},
        // 新增第9题
        { text: "你希望男友有什么超能力？", options: [
            { text: "瞬间移动", match: "Riku" },
            { text: "读心术", match: "Sion" },
            { text: "长生不老", match: "Xiumin" },
            { text: "点石成金", match: "G-Dragon" },
            { text: "隐身", match: "Asahi" }
        ]},
        // 新增第10题
        { text: "你觉得自己是什么类型的女生？", options: [
            { text: "御姐", match: "Choi Hyunsuk" },
            { text: "软妹", match: "Yushi" },
            { text: "神经质", match: "Daesung" },
            { text: "学霸", match: "Bang Yedam" },

        ]}
    ];

    let userName = "";
    let easterEgg = false;

    // 询问名字（页面加载时）
    (function askName() {
        let inputName = prompt("✨ 测试开始前，请告诉我你的名字（昵称即可）：", "");
        if (inputName === null || inputName.trim() === "") {
            userName = "神秘人";
        } else {
            userName = inputName.trim();
        }
        // 彩蛋：如果名字是“朱诗琪”（不区分大小写，去除空格）
        if (userName === "朱诗琪" || userName.toLowerCase() === "朱诗琪") {
            easterEgg = true;
        }
    })();

    function renderQuiz() {
        const form = document.getElementById('quizForm');
        form.innerHTML = '';
        questions.forEach((q, idx) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `<h3>${idx+1}. ${q.text}</h3>`;
            q.options.forEach(opt => {
                const label = document.createElement('label');
                label.className = 'option';
                label.innerHTML = `<input type="radio" name="q${idx}" value="${opt.match}" required> ${opt.text}`;
                form.appendChild(label);
            });
            form.appendChild(qDiv);
        });
    }

    function computeResult() {
        const form = document.getElementById('quizForm');
        const selected = [];
        for (let i = 0; i < questions.length; i++) {
            const radios = form.querySelectorAll(`input[name="q${i}"]`);
            let found = null;
            for (let r of radios) {
                if (r.checked) {
                    found = r.value;
                    break;
                }
            }
            if (!found) return null;
            selected.push(found);
        }
        const freq = {};
        selected.forEach(name => { freq[name] = (freq[name] || 0) + 1; });
        let maxCount = 0, maxName = null;
        for (let [name, count] of Object.entries(freq)) {
            if (count > maxCount) {
                maxCount = count;
                maxName = name;
            }
        }
        return maxName;
    }

    function showResult(boyName) {
        const boy = boyfriends[boyName];
        const resultNameEl = document.getElementById('resultName');
        const resultGroupEl = document.getElementById('resultGroup');
        const resultDescEl = document.getElementById('resultDesc');
        const easterContainer = document.getElementById('easterEggContainer');
        
        if (!boy) {
            resultNameEl.innerText = boyName || "某个神秘人";
            resultGroupEl.innerText = "??";
            resultDescEl.innerText = "这位男友从数据库逃跑了，再测一次吧。";
        } else {
            resultNameEl.innerText = boyName;
            resultGroupEl.innerText = boy.group;
            resultDescEl.innerHTML = boy.desc;
        }
        
        // 彩蛋显示
        if (easterEgg) {
            easterContainer.innerHTML = `<div class="easter-egg">✨ 特别提示 ✨<br>不管测试结果如何，您的爱侣始终是 <strong>吴时温</strong>！<br>（测试结果仅供娱乐，命运早已注定）</div>`;
        } else {
            easterContainer.innerHTML = '';
        }
        
        document.getElementById('quizPanel').style.display = 'none';
        document.getElementById('resultPanel').style.display = 'block';
    }

    function resetQuiz() {
        document.getElementById('quizForm').reset();
        document.getElementById('quizPanel').style.display = 'block';
        document.getElementById('resultPanel').style.display = 'none';
        window.scrollTo(0, 0);
    }

    document.getElementById('submitBtn').addEventListener('click', function(e) {
        e.preventDefault();
        const resultName = computeResult();
        if (!resultName) {
            alert("请回答所有问题，命运不容逃避！");
            return;
        }
        showResult(resultName);
    });
    document.getElementById('retryBtn').addEventListener('click', function() {
        resetQuiz();
    });

    renderQuiz();
</script>
</body>
</html>
